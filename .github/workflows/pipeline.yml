name: Executar Pipeline
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  executar-jobs:
    runs-on: ubuntu-latest
    steps:
    - name: clone-repo
      uses: actions/checkout@v3
    - name: setup-docker
      uses: docker/setup-buildx-action@v2
    - name: instalar-docker-compose
      run: |
        sudo curl -L "https://github.com/docker/compose/releases/download/v2.39.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
        sudo chmod +x /usr/local/bin/docker-compose
    - name: executar-docker-compose
      run: |
        docker-compose up --build
    - name: upload-resultados
      uses: actions/upload-artifact@v4
      with:
        name: salvar-resultados
        path: data/resultados/